# ==========================================
# APPLICATION
# ==========================================
spring.application.name=tutorschool_db
server.port=8080

# ==========================================
# DATABASE (PostgreSQL)
# สร้าง database ก่อน: CREATE DATABASE tutorschool_db;
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/tutorschool_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:2544}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# JPA / HIBERNATE
# ddl-auto=update สำหรับ development (สร้าง table อัตโนมัติ)
# ddl-auto=validate สำหรับ production
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# JWT
# เปลี่ยน JWT_SECRET เป็น base64 key ของจริงใน production
# ==========================================
jwt.secret=${JWT_SECRET:VGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIFR1dG9yIFNjaG9vbCBTeXN0ZW0gMjAyNg==}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ==========================================
# JACKSON (JSON Serialization)
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Bangkok

# ==========================================
# MAIL (Gmail SMTP)
# ตั้งค่า environment variables:
#   MAIL_USERNAME=your-email@gmail.com
#   MAIL_PASSWORD=your-app-password (Google App Password)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
